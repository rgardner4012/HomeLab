---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arc-github-app-secret
  namespace: arc-runners
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: arc-github-app-secret
    creationPolicy: Owner
  data:
    - secretKey: github_app_id # pragma: allowlist secret
      remoteRef:
        key: arc/github-app
        property: github_app_id
    - secretKey: github_app_installation_id # pragma: allowlist secret
      remoteRef:
        key: arc/github-app
        property: github_app_installation_id
    - secretKey: github_app_private_key # pragma: allowlist secret
      remoteRef:
        key: arc/github-app
        property: github_app_private_key
