---
all:
  hosts:
    nas:
      ansible_host: "{{ lookup('ansible.builtin.env', 'NAS_HOST', default=undef()) }}"
      ansible_user: "{{ lookup('ansible.builtin.env', 'NAS_USER', default=undef()) }}"
      ansible_ssh_private_key_file: ~/.ssh/nas_deploy_key
      ansible_ssh_common_args: '-o StrictHostKeyChecking=yes'
