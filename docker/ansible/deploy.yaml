---
- name: Deploy Docker Compose stacks on NAS
  hosts: nas
  vars:
    docker_compose_root: /volume3/docker_compose
  tasks:
    - name: Deploy stack
      community.docker.docker_compose_v2:
        project_name: "{{ item }}"
        project_src: "{{ docker_compose_root }}/{{ item }}"
        state: present
      loop: "{{ stacks.split(',') }}"
